name: Publish to MCP Registry

# Publishes server.json to the official MCP registry on version tags, using
# GitHub OIDC (no interactive login, no secrets). The io.github.lizhuojunx86/*
# namespace is authorized by the OIDC token's repository owner.
#
# Prerequisite: the PyPI package version referenced in server.json must already
# be published with the `mcp-name: io.github.lizhuojunx86/chinese-history-mcp`
# marker in its README (the registry checks the PyPI description).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC authentication
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
